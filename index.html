<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>ChoreScore</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --accent2: #0f3460;
    --gold: #f5a623;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --green: #4ecca3;
    --border: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(233,69,96,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(78,204,163,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,26,0.9);
    backdrop-filter: blur(20px);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .score-pills {
    display: flex;
    gap: 8px;
  }

  .score-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .score-pill.active { border-color: var(--accent); background: rgba(233,69,96,0.1); }
  .score-pill .name { color: var(--muted); font-size: 0.65rem; }
  .score-pill .pts { font-weight: 700; color: var(--gold); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-radius: 10px;
    padding: 3px;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 7px;
    font-size: 0.7rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab.active {
    background: var(--accent);
    color: white;
  }

  /* MAIN */
  main {
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* SECTION */
  .section { display: none; }
  .section.active { display: block; }

  /* CHORE CARD */
  .chores-list { display: flex; flex-direction: column; gap: 10px; }

  .chore-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
    transition: all 0.25s;
  }

  .chore-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 3px 0 0 3px;
  }

  .chore-card.done::before { background: var(--green); }

  .chore-card.done {
    opacity: 0.6;
  }

  .chore-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .chore-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
  }

  .chore-pts {
    background: rgba(245,166,35,0.15);
    border: 1px solid rgba(245,166,35,0.3);
    color: var(--gold);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 0.7rem;
    font-weight: 700;
  }

  .chore-meta {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .badge {
    font-size: 0.62rem;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .badge.freq { border-color: rgba(78,204,163,0.3); color: var(--green); }

  .chore-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .btn-done {
    flex: 1;
    background: rgba(78,204,163,0.1);
    border: 1px solid rgba(78,204,163,0.3);
    color: var(--green);
    padding: 8px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-done.undo {
    background: rgba(233,69,96,0.08);
    border-color: rgba(233,69,96,0.2);
    color: var(--accent);
  }

  .btn-done:active { transform: scale(0.97); }

  .btn-icon {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

  /* DUE INDICATOR */
  .due-indicator {
    font-size: 0.6rem;
    color: var(--accent);
    margin-left: auto;
  }

  /* LEADERBOARD */
  .leaderboard {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .lb-header {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .lb-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .lb-card.first { border-color: rgba(245,166,35,0.4); }

  .lb-rank {
    font-size: 2.5rem;
    margin-bottom: 4px;
  }

  .lb-player {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    margin-bottom: 4px;
  }

  .lb-score {
    color: var(--gold);
    font-size: 0.85rem;
    font-weight: 700;
  }

  .lb-big-score {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 3rem;
    color: var(--gold);
    line-height: 1;
  }

  .lb-breakdown {
    margin-top: 12px;
    font-size: 0.7rem;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 4px;
    text-align: left;
  }

  .lb-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }

  /* MANAGE */
  .manage-list { display: flex; flex-direction: column; gap: 10px; }

  .manage-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .manage-info { flex: 1; }
  .manage-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
  }
  .manage-sub {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: var(--accent);
    color: white;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(233,69,96,0.4);
    z-index: 200;
    transition: all 0.2s;
  }

  .fab:active { transform: scale(0.93); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    border-top: 1px solid var(--border);
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    margin-bottom: 20px;
  }

  .modal-title span { color: var(--accent); }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1.5px;
    margin-bottom: 6px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
  }

  .field input, .field select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border 0.2s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
  }

  .field select option { background: var(--surface); }

  .row-fields { display: flex; gap: 12px; }
  .row-fields .field { flex: 1; }

  .pts-preview {
    background: rgba(245,166,35,0.08);
    border: 1px dashed rgba(245,166,35,0.3);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    margin-bottom: 16px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .pts-preview .big { font-size: 1.8rem; font-weight: 700; color: var(--gold); display: block; font-family: 'Syne', sans-serif; }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-primary:active { transform: scale(0.98); }

  .btn-cancel {
    width: 100%;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    margin-top: 8px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--green);
    color: #0f0f1a;
    padding: 10px 20px;
    border-radius: 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    z-index: 400;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-text { font-family: 'Syne', sans-serif; font-size: 0.85rem; }

  /* PERIOD BADGE */
  .period-section {
    margin-bottom: 20px;
  }
  .period-label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .period-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .reset-btn {
    background: transparent;
    border: 1px solid rgba(233,69,96,0.3);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.65rem;
    cursor: pointer;
    letter-spacing: 1px;
  }

  .settings-section {
    margin-bottom: 24px;
  }

  .settings-section h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .name-input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .name-input-row input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    outline: none;
  }

  .name-input-row input:focus { border-color: var(--accent); }

  .name-badge {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">Chore<span>Score</span></div>
    <div class="score-pills">
      <div class="score-pill active" id="pill-p1" onclick="app.switchActive(0)">
        <span class="name" id="pill-name-0">You</span>
        <span class="pts" id="pill-pts-0">0</span>
      </div>
      <div class="score-pill" id="pill-p2" onclick="app.switchActive(1)">
        <span class="name" id="pill-name-1">GF</span>
        <span class="pts" id="pill-pts-1">0</span>
      </div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="app.showTab('chores')">CHORES</div>
    <div class="tab" onclick="app.showTab('scores')">SCORES</div>
    <div class="tab" onclick="app.showTab('manage')">MANAGE</div>
  </div>
</header>

<main>
  <!-- CHORES TAB -->
  <section class="section active" id="tab-chores">
    <div id="chores-container"></div>
  </section>

  <!-- SCORES TAB -->
  <section class="section" id="tab-scores">
    <div class="leaderboard" id="leaderboard-container"></div>
  </section>

  <!-- MANAGE TAB -->
  <section class="section" id="tab-manage">
    <div class="settings-section">
      <h3>PLAYER NAMES</h3>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="name-input-row">
          <div class="name-badge" style="background:rgba(233,69,96,0.15)">👤</div>
          <input type="text" id="name-0" placeholder="Your name" oninput="app.updateName(0, this.value)">
        </div>
        <div class="name-input-row">
          <div class="name-badge" style="background:rgba(78,204,163,0.15)">👤</div>
          <input type="text" id="name-1" placeholder="GF's name" oninput="app.updateName(1, this.value)">
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3 style="margin:0">CHORE LIST</h3>
        <button class="reset-btn" onclick="app.resetScores()">RESET SCORES</button>
      </div>
      <div class="manage-list" id="manage-list"></div>
    </div>
  </section>
</main>

<!-- FAB -->
<button class="fab" onclick="app.openAddModal()" id="fab-btn">＋</button>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="app.closeModal(event)">
  <div class="modal">
    <div class="modal-title">Add <span>Chore</span></div>

    <div class="field">
      <label>CHORE NAME</label>
      <input type="text" id="input-name" placeholder="e.g. Vacuum Living Room">
    </div>

    <div class="row-fields">
      <div class="field">
        <label>TIME (MINS)</label>
        <select id="input-time">
          <option value="5">5 min</option>
          <option value="10">10 min</option>
          <option value="15" selected>15 min</option>
          <option value="20">20 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
          <option value="90">90 min</option>
          <option value="120">2 hrs</option>
        </select>
      </div>
      <div class="field">
        <label>FREQUENCY</label>
        <select id="input-freq">
          <option value="daily">Daily</option>
          <option value="weekly" selected>Weekly</option>
          <option value="biweekly">Bi-weekly</option>
          <option value="monthly">Monthly</option>
          <option value="asneeded">As needed</option>
        </select>
      </div>
    </div>

    <div class="pts-preview">
      <span class="big" id="pts-preview">0</span>
      POINTS PER COMPLETION
    </div>

    <button class="btn-primary" onclick="app.addChore()">ADD CHORE</button>
    <button class="btn-cancel" onclick="app.closeModal()">Cancel</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const FREQ_MULT = { daily: 4, weekly: 2, biweekly: 1.5, monthly: 1, asneeded: 1.2 };
const FREQ_LABEL = { daily: 'Daily', weekly: 'Weekly', biweekly: 'Bi-weekly', monthly: 'Monthly', asneeded: 'As needed' };

function calcPts(time, freq) {
  return Math.round((parseInt(time) / 5) * (FREQ_MULT[freq] || 1));
}

const app = {
  state: null,

  init() {
    const saved = localStorage.getItem('choreScore');
    if (saved) {
      this.state = JSON.parse(saved);
    } else {
      this.state = {
        players: ['You', 'GF'],
        activePlayer: 0,
        chores: [],
        completions: [], // {choreId, playerId, ts, pts}
      };
    }
    // Load names
    document.getElementById('name-0').value = this.state.players[0];
    document.getElementById('name-1').value = this.state.players[1];

    // Pts preview listeners
    document.getElementById('input-time').addEventListener('change', () => this.updatePtsPreview());
    document.getElementById('input-freq').addEventListener('change', () => this.updatePtsPreview());
    this.updatePtsPreview();
    this.render();
  },

  save() {
    localStorage.setItem('choreScore', JSON.stringify(this.state));
  },

  showTab(tab) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    event.target.classList.add('active');
    const fab = document.getElementById('fab-btn');
    fab.style.display = (tab === 'manage' || tab === 'chores') ? 'flex' : 'none';
    this.render();
  },

  switchActive(idx) {
    this.state.activePlayer = idx;
    document.querySelectorAll('.score-pill').forEach((p, i) => {
      p.classList.toggle('active', i === idx);
    });
    this.save();
    this.renderChores();
    this.toast(`Now logging as ${this.state.players[idx]}`);
  },

  updateName(idx, val) {
    this.state.players[idx] = val || (idx === 0 ? 'You' : 'GF');
    this.save();
    this.renderPills();
  },

  updatePtsPreview() {
    const t = document.getElementById('input-time').value;
    const f = document.getElementById('input-freq').value;
    document.getElementById('pts-preview').textContent = calcPts(t, f);
  },

  openAddModal() {
    document.getElementById('modal').classList.add('open');
    document.getElementById('input-name').focus();
  },

  closeModal(e) {
    if (!e || e.target === document.getElementById('modal')) {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('input-name').value = '';
    }
  },

  addChore() {
    const name = document.getElementById('input-name').value.trim();
    if (!name) { document.getElementById('input-name').focus(); return; }
    const time = document.getElementById('input-time').value;
    const freq = document.getElementById('input-freq').value;
    const pts = calcPts(time, freq);

    this.state.chores.push({
      id: Date.now(),
      name,
      time: parseInt(time),
      freq,
      pts
    });

    this.save();
    this.closeModal();
    this.render();
    this.toast(`+${pts}pts chore added!`);
  },

  deleteChore(id) {
    this.state.chores = this.state.chores.filter(c => c.id !== id);
    this.state.completions = this.state.completions.filter(c => c.choreId !== id);
    this.save();
    this.render();
  },

  completeChore(id) {
    const chore = this.state.chores.find(c => c.id === id);
    if (!chore) return;
    const pid = this.state.activePlayer;

    // Check if already done today (for daily) or this week (for weekly), etc
    const todayKey = this.getTodayKey(chore.freq);
    const existing = this.state.completions.find(c =>
      c.choreId === id && c.playerId === pid && c.periodKey === todayKey
    );

    if (existing) {
      // Undo
      this.state.completions = this.state.completions.filter(c =>
        !(c.choreId === id && c.playerId === pid && c.periodKey === todayKey)
      );
      this.toast(`Undone: ${chore.name}`);
    } else {
      this.state.completions.push({
        choreId: id,
        playerId: pid,
        ts: Date.now(),
        pts: chore.pts,
        periodKey: todayKey
      });
      this.toast(`+${chore.pts}pts for ${this.state.players[pid]}! 🎉`);
    }

    this.save();
    this.renderChores();
    this.renderPills();
  },

  getTodayKey(freq) {
    const now = new Date();
    if (freq === 'daily') return `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
    if (freq === 'weekly') {
      const week = Math.floor(now.getDate() / 7);
      return `${now.getFullYear()}-${now.getMonth()}-w${week}`;
    }
    if (freq === 'biweekly') {
      const bw = Math.floor(now.getDate() / 14);
      return `${now.getFullYear()}-${now.getMonth()}-bw${bw}`;
    }
    if (freq === 'monthly') return `${now.getFullYear()}-${now.getMonth()}`;
    return `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`; // asneeded = daily
  },

  isDone(choreId) {
    const chore = this.state.chores.find(c => c.id === choreId);
    if (!chore) return false;
    const pid = this.state.activePlayer;
    const key = this.getTodayKey(chore.freq);
    return this.state.completions.some(c =>
      c.choreId === choreId && c.playerId === pid && c.periodKey === key
    );
  },

  getPlayerScore(pid) {
    return this.state.completions
      .filter(c => c.playerId === pid)
      .reduce((sum, c) => sum + c.pts, 0);
  },

  getPlayerCompletions(pid) {
    return this.state.completions.filter(c => c.playerId === pid);
  },

  resetScores() {
    if (confirm('Reset all scores and completions? This cannot be undone.')) {
      this.state.completions = [];
      this.save();
      this.render();
      this.toast('Scores reset!');
    }
  },

  renderPills() {
    this.state.players.forEach((name, i) => {
      document.getElementById('pill-name-' + i).textContent = name;
      document.getElementById('pill-pts-' + i).textContent = this.getPlayerScore(i) + 'pts';
    });
  },

  renderChores() {
    const container = document.getElementById('chores-container');
    const chores = this.state.chores;

    if (chores.length === 0) {
      container.innerHTML = `<div class="empty"><div class="empty-icon">🧹</div><div class="empty-text">No chores yet!<br>Tap + to add your first chore</div></div>`;
      return;
    }

    // Group by frequency
    const groups = {};
    chores.forEach(c => {
      if (!groups[c.freq]) groups[c.freq] = [];
      groups[c.freq].push(c);
    });

    const freqOrder = ['daily', 'weekly', 'biweekly', 'monthly', 'asneeded'];
    let html = '';

    freqOrder.forEach(freq => {
      if (!groups[freq]) return;
      html += `<div class="period-section">
        <div class="period-label">${FREQ_LABEL[freq]}</div>
        <div class="chores-list">`;

      groups[freq].forEach(chore => {
        const done = this.isDone(chore.id);
        html += `
          <div class="chore-card ${done ? 'done' : ''}">
            <div class="chore-top">
              <div class="chore-name">${chore.name}</div>
              <div class="chore-pts">${chore.pts}pts</div>
            </div>
            <div class="chore-meta">
              <span class="badge">${chore.time} min</span>
              <span class="badge freq">${FREQ_LABEL[chore.freq]}</span>
            </div>
            <div class="chore-actions">
              <button class="btn-done ${done ? 'undo' : ''}" onclick="app.completeChore(${chore.id})">
                ${done ? '↩ UNDO' : '✓ DONE'}
              </button>
            </div>
          </div>`;
      });

      html += `</div></div>`;
    });

    container.innerHTML = html;
  },

  renderScores() {
    const container = document.getElementById('leaderboard-container');
    const scores = this.state.players.map((name, i) => ({
      name,
      idx: i,
      score: this.getPlayerScore(i),
      completions: this.getPlayerCompletions(i)
    })).sort((a, b) => b.score - a.score);

    let html = '';

    scores.forEach((p, rank) => {
      const emoji = rank === 0 ? (p.score > (scores[1]?.score || 0) ? '🏆' : '🤝') : '💪';

      // breakdown by chore
      const breakdown = {};
      p.completions.forEach(c => {
        const chore = this.state.chores.find(ch => ch.id === c.choreId);
        if (chore) {
          breakdown[chore.name] = (breakdown[chore.name] || 0) + c.pts;
        }
      });

      const breakdownRows = Object.entries(breakdown)
        .sort((a, b) => b[1] - a[1])
        .map(([name, pts]) => `<div class="lb-row"><span>${name}</span><span style="color:var(--gold)">${pts}pts</span></div>`)
        .join('');

      html += `<div class="lb-card ${rank === 0 ? 'first' : ''}">
        <div class="lb-rank">${emoji}</div>
        <div class="lb-player">${p.name}</div>
        <div class="lb-big-score">${p.score}</div>
        <div class="lb-score">TOTAL POINTS</div>
        ${breakdownRows ? `<div class="lb-breakdown">${breakdownRows}</div>` : ''}
      </div>`;
    });

    if (this.state.completions.length === 0) {
      html = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">No completions yet!<br>Start doing chores to earn points</div></div>`;
    }

    container.innerHTML = html;
  },

  renderManage() {
    const list = document.getElementById('manage-list');
    if (this.state.chores.length === 0) {
      list.innerHTML = `<div style="color:var(--muted);font-size:0.8rem;padding:20px 0;text-align:center">No chores added yet</div>`;
      return;
    }
    list.innerHTML = this.state.chores.map(c => `
      <div class="manage-card">
        <div class="manage-info">
          <div class="manage-name">${c.name}</div>
          <div class="manage-sub">${c.time}min · ${FREQ_LABEL[c.freq]} · <span style="color:var(--gold)">${c.pts}pts</span></div>
        </div>
        <button class="btn-icon" onclick="app.deleteChore(${c.id})" style="color:var(--accent);border-color:rgba(233,69,96,0.3)">🗑</button>
      </div>
    `).join('');
  },

  render() {
    this.renderPills();
    this.renderChores();
    this.renderScores();
    this.renderManage();
  },

  toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
};

app.init();
</script>
</body>
</html>
